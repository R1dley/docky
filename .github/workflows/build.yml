name: Build Docky macOS App

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    # Downgraded runner slightly to improve compatibility with older project code
    runs-on: macos-13 

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4 # This is perfectly fine; warning safely ignored

    - name: Select Xcode Version
      run: |
        sudo xcode-select -s /Applications/Xcode_14.3.1.app/Contents/Developer
        xcodebuild -version

    - name: Build App
      run: |
        xcodebuild -project Docky.xcodeproj \
                   -scheme Docky \
                   -configuration Release \
                   -derivedDataPath build \
                   COMPILER_INDEX_STORE_ENABLE=NO \
                   CODE_SIGN_IDENTITY="" \
                   CODE_SIGNING_REQUIRED=NO \
                   CODE_SIGNING_ALLOWED=NO
                   
    - name: Package App into ZIP
      run: |
        cd build/Build/Products/Release
        zip -r Docky.zip Docky.app

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Docky-macOS-Build
        path: build/Build/Products/Release/Docky.zip
